services:
  roster:
    build: .
    container_name: roster
    restart: unless-stopped
    ports:
      - "${ROSTER_PORT:-8081}:3000"
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      DATABASE_PATH: /app/data/roster-calculator.sqlite
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
